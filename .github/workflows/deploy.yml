name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker login
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # Build backend
      - name: Build backend
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/backend:latest ./backend
          docker push ${{ secrets.DOCKER_USER }}/backend:latest

      # Build frontend
      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USER }}/frontend:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd app
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f